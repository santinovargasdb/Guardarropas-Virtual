<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 640" fill="none">
  <!-- Matte solid silhouette: flat fills so overlapping limbs read as one body (no seams). -->
  <!-- soft ground shadow -->
  <ellipse cx="150" cy="626" rx="60" ry="8" fill="#6E5A47" opacity="0.20"/>

  <!-- legs: full thighs tapering through the knee to slim ankles -->
  <path d="M124 348 C116 400 116 450 120 496 C122 528 125 556 131 580 C132 590 142 590 143 580 C147 556 149 528 148 496 C151 450 151 400 144 348 Z" fill="#211E19"/>
  <path d="M176 348 C184 400 184 450 180 496 C178 528 175 556 169 580 C168 590 158 590 157 580 C153 556 151 528 152 496 C149 450 149 400 156 348 Z" fill="#211E19"/>

  <!-- feet -->
  <path d="M129 579 C125 592 130 601 142 600 C150 599 150 590 147 581 Z" fill="#211E19"/>
  <path d="M171 579 C175 592 170 601 158 600 C150 599 150 590 153 581 Z" fill="#211E19"/>

  <!-- torso + hips: sloped shoulders, soft bust, narrow waist, full rounded hips -->
  <path d="M150 116 C133 116 121 122 112 138 C103 160 101 186 107 210 C116 230 125 234 128 248 C103 278 100 312 108 344 C111 354 115 360 122 364 L178 364 C185 360 189 354 192 344 C200 312 197 278 172 248 C175 234 184 230 193 210 C199 186 197 160 188 138 C179 122 167 116 150 116 Z" fill="#211E19"/>

  <!-- arms: smooth, spring from the shoulders, soft hands at the hips -->
  <path d="M120 140 C104 162 97 200 99 242 C100 280 105 314 111 340 C109 350 111 361 119 362 C126 361 128 350 125 340 C123 312 121 280 120 244 C119 200 122 174 130 150 Z" fill="#211E19"/>
  <path d="M180 140 C196 162 203 200 201 242 C200 280 195 314 189 340 C191 350 189 361 181 362 C174 361 172 350 175 340 C177 312 179 280 180 244 C181 200 178 174 170 150 Z" fill="#211E19"/>

  <!-- neck -->
  <path d="M142 86 C141 100 141 110 144 118 L156 118 C159 110 159 100 158 86 Z" fill="#211E19"/>

  <!-- head -->
  <ellipse cx="150" cy="60" rx="27" ry="32" fill="#211E19"/>

  <!-- ── HAIR: jet black (a shade deeper than the matte body), long & straight ── -->
  <path d="M150 24 C128 24 110 42 107 80 L107 216 C107 231 111 240 118 239 C125 238 124 226 124 210 L124 94 C126 62 138 50 150 49 C162 50 174 62 176 94 L176 210 C176 226 175 238 182 239 C189 240 193 231 193 216 L193 80 C190 42 172 24 150 24 Z" fill="#0A0A0C"/>

  <!-- dense straight fringe over the forehead -->
  <path d="M125 35 C136 28 164 28 175 35 C176 45 176 52 175 56 L171 56 L129 56 L125 56 C124 52 124 45 125 35 Z" fill="#0A0A0C"/>

  <!-- hair sheen: soft highlights for a fluid, jet-black look -->
  <g stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M112 78 L111 222"/>
    <path d="M119 66 L118 232"/>
    <path d="M188 78 L189 222"/>
    <path d="M181 66 L182 232"/>
  </g>
  <path d="M132 34 C145 29 155 29 168 34" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
