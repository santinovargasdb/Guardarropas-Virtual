<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 640" fill="none">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0E5DA"/>
      <stop offset="1" stop-color="#E0D0C2"/>
    </linearGradient>
  </defs>

  <!-- soft ground shadow -->
  <ellipse cx="150" cy="624" rx="72" ry="9" fill="#C9A57E" opacity="0.15"/>

  <!-- head -->
  <ellipse cx="150" cy="64" rx="33" ry="39" fill="url(#bodyGrad)"/>
  <!-- neck -->
  <rect x="139" y="96" width="22" height="26" rx="10" fill="url(#bodyGrad)"/>

  <!-- arms -->
  <rect x="78" y="138" width="20" height="150" rx="10" fill="url(#bodyGrad)" transform="rotate(8 88 138)"/>
  <rect x="202" y="138" width="20" height="150" rx="10" fill="url(#bodyGrad)" transform="rotate(-8 212 138)"/>

  <!-- torso (soft hourglass) -->
  <path d="M104 128 q46 -16 92 0 q14 6 12 26 l-8 92 q-2 18 -10 30 q-16 18 -40 18 t-40 -18 q-8 -12 -10 -30 l-8 -92 q-2 -20 12 -26 z" fill="url(#bodyGrad)"/>

  <!-- hips -->
  <path d="M112 318 q38 -14 76 0 q10 4 8 22 l-6 44 h-80 l-6 -44 q-2 -18 8 -22 z" fill="url(#bodyGrad)"/>

  <!-- legs -->
  <rect x="120" y="380" width="26" height="216" rx="13" fill="url(#bodyGrad)"/>
  <rect x="154" y="380" width="26" height="216" rx="13" fill="url(#bodyGrad)"/>

  <!-- feet -->
  <ellipse cx="130" cy="600" rx="20" ry="12" fill="url(#bodyGrad)"/>
  <ellipse cx="170" cy="600" rx="20" ry="12" fill="url(#bodyGrad)"/>
</svg>
