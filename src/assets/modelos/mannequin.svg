<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 640" fill="none">
  <defs>
    <linearGradient id="bodyDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#403B35"/>
      <stop offset="1" stop-color="#221E1A"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4E9DD"/>
      <stop offset="1" stop-color="#E7D3C0"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0" stop-color="#171615"/>
      <stop offset="1" stop-color="#040404"/>
    </linearGradient>
  </defs>

  <!-- soft ground shadow -->
  <ellipse cx="150" cy="624" rx="64" ry="9" fill="#7A6450" opacity="0.18"/>

  <!-- ── BODY (dark silhouette) ──────────────────────────────────────────── -->
  <!-- arms with simple hands, spring from the shoulders and rest along the body -->
  <path d="M121 138 C104 164 97 206 99 248 C100 286 105 320 110 346 C108 356 110 366 117 368 C124 369 127 360 125 350 C123 320 122 286 121 248 C121 200 123 180 131 146 Z" fill="url(#bodyDark)"/>
  <path d="M179 138 C196 164 203 206 201 248 C200 286 195 320 190 346 C192 356 190 366 183 368 C176 369 173 360 175 350 C177 320 178 286 179 248 C179 200 177 180 169 146 Z" fill="url(#bodyDark)"/>

  <!-- torso + hips: sloped shoulders, soft bust, narrow waist, full rounded hips -->
  <path d="M150 116 C134 116 122 121 113 137 C104 160 102 185 108 211 C117 231 126 234 129 250 C103 283 99 315 106 346 C111 373 116 393 125 412 L175 412 C184 393 189 373 194 346 C201 315 197 283 171 250 C174 234 183 231 192 211 C198 185 196 160 187 137 C178 121 166 116 150 116 Z" fill="url(#bodyDark)"/>

  <!-- legs: full thighs tapering through the knee to slim ankles -->
  <path d="M126 396 C120 432 120 462 123 490 C125 520 126 552 131 578 C132 587 140 587 141 578 C145 552 146 520 144 490 C147 462 147 432 142 396 Z" fill="url(#bodyDark)"/>
  <path d="M174 396 C180 432 180 462 177 490 C175 520 174 552 169 578 C168 587 160 587 159 578 C155 552 154 520 156 490 C153 462 153 432 158 396 Z" fill="url(#bodyDark)"/>

  <!-- feet -->
  <path d="M129 580 C126 591 131 598 140 597 C148 596 148 587 145 581 Z" fill="url(#bodyDark)"/>
  <path d="M171 580 C174 591 169 598 160 597 C152 596 152 587 155 581 Z" fill="url(#bodyDark)"/>

  <!-- skin neck -->
  <path d="M143 84 C142 100 142 112 145 120 L155 120 C158 112 158 100 157 84 Z" fill="url(#skinGrad)"/>

  <!-- ── HAIR: long, straight, jet black, falls vertically below the shoulders ─ -->
  <path d="M150 16 C122 16 102 36 99 80 L99 232 C99 246 104 256 113 255 C120 254 123 240 123 214 L124 90 C127 58 138 47 150 46 C162 47 173 58 176 90 L177 214 C177 240 180 254 187 255 C196 256 201 246 201 232 L201 80 C198 36 178 16 150 16 Z" fill="url(#hairGrad)"/>

  <!-- skin face -->
  <ellipse cx="150" cy="60" rx="27" ry="32" fill="url(#skinGrad)"/>

  <!-- dense straight fringe over the forehead -->
  <path d="M123 34 C134 27 166 27 177 34 C178 44 178 51 177 55 L173 55 L127 55 L123 55 C122 51 122 44 123 34 Z" fill="url(#hairGrad)"/>

  <!-- hair sheen: thin highlights that define the long straight strands -->
  <g stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M103 74 L102 238"/>
    <path d="M112 62 L111 244"/>
    <path d="M197 74 L198 238"/>
    <path d="M188 62 L189 244"/>
  </g>
  <path d="M132 33 C145 29 156 29 168 33" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
